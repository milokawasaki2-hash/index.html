<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MULTI-AUDIO PRO V3.1</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(15, 15, 18, 0.98);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        #ui-generator { display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #050505; padding: 10px; box-sizing: border-box; }
        #ui-player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; justify-content: center; align-items: center; background-color: #000; background-size: cover; background-position: center; z-index: 9999; }

        .card { background: #000; padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; width: 100%; max-width: 550px; height: 92vh; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .main-title { text-align: center; color: var(--neon-blue); margin: 0 0 10px 0; font-size: 16px; font-weight: 900; text-transform: uppercase; }

        .import-box { background: #0a0a0a; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px dashed #333; }
        .import-box span { color: var(--neon-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 5px; }

        #inputs-scroll-area { overflow-y: auto; flex: 1; padding-right: 5px; }
        .section-group { margin-bottom: 10px; background: #080808; padding: 10px; border-radius: 8px; border: 1px solid #151515; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .section-label { color: var(--neon-blue); font-size: 11px; font-weight: 800; }
        
        .input-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        select { background: #111; color: #fff; border: 1px solid #333; padding: 8px 2px; border-radius: 5px; font-size: 10px; outline: none; width: 110px; }
        input { flex: 1; padding: 9px; background: #000; border: 1px solid #222; border-radius: 5px; color: #fff; font-size: 11px; outline: none; }
        .btn-add { background: var(--neon-blue); border: none; color: #000; border-radius: 4px; padding: 2px 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-del { background: #ff3333; border: none; color: white; border-radius: 4px; padding: 0 8px; height: 32px; cursor: pointer; }

        .btn-main { width: 100%; padding: 14px; background: var(--neon-blue); border: none; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 12px; color: #000; margin-top: 10px; }
        #box-link { display:none; margin-top:10px; border:1px solid var(--neon-blue); padding:10px; background: #00151a; border-radius: 8px; }

        /* --- PLAYER UI --- */
        #content-wrapper { z-index: 10; width: 95%; max-width: 800px; text-align: center; }
        .tabs-audio { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .tab-btn { cursor: pointer; opacity: 0.3; transition: 0.3s; display: none; text-align: center; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .tab-btn img { width: 40px; border-radius: 4px; margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.2); }
        .tab-btn span { font-size: 10px; font-weight: bold; display: block; color: #fff; }

        .server-list { display: none; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; max-height: 55vh; overflow-y: auto; padding: 10px; }
        .server-list.active { display: grid; }
        .server-item { background: var(--card-bg); border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 10000; background: #000; }
        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #btn-back { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0,0,0,0.85); color: var(--neon-blue); 
            border: 1px solid var(--neon-blue); width: 35px; height: 35px; 
            border-radius: 8px; z-index: 10001; display: none; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ui-generator">
        <div class="card">
            <h2 class="main-title">EDITOR MULTI-AUDIO PRO</h2>
            
            <div class="import-box">
                <span>Editar link generado anteriormente</span>
                <input type="text" id="import-url" placeholder="Pega el link aquí...">
                <button onclick="importData()" style="width:100%; background:#111; color:var(--neon-blue); border:1px solid #222; padding:8px; border-radius:3px; font-size:10px; cursor:pointer; margin-top:5px; font-weight:bold;">CARGAR DATOS PARA AGREGAR MÁS</button>
            </div>

            <div id="inputs-scroll-area">
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇯🇵 JAPONÉS</span><button class="btn-add" onclick="addInput('jap')">+</button></div>
                    <div id="cont-jap" class="input-list"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇲🇽 LATINO</span><button class="btn-add" onclick="addInput('lat')">+</button></div>
                    <div id="cont-lat" class="input-list"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇪🇸 CASTELLANO</span><button class="btn-add" onclick="addInput('cas')">+</button></div>
                    <div id="cont-cas" class="input-list"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇺🇸 INGLÉS</span><button class="btn-add" onclick="addInput('ing')">+</button></div>
                    <div id="cont-ing" class="input-list"></div>
                </div>
                <div class="section-group">
                    <span class="section-label" style="display:block; margin-bottom:4px;">IMAGEN DE FONDO (URL)</span>
                    <input type="text" id="bg-in" placeholder="https://mi-imagen.jpg">
                </div>
                <button class="btn-main" onclick="buildLink()">GENERAR NUEVO LINK</button>
                <div id="box-link">
                    <input type="text" id="out-url" readonly style="width:100%; background:transparent; border:1px solid var(--neon-blue); color:var(--neon-blue); margin-bottom:10px; text-align:center;">
                    <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); padding:10px; font-weight:bold; cursor:pointer; border:none; border-radius:4px;">COPIAR ENLACE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-player">
        <button id="btn-back" onclick="closeVideo()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>JAP</span></div>
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>LAT</span></div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')"><img src="https://flagcdn.com/w80/es.png"><span>ESP</span></div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')"><img src="https://flagcdn.com/w80/us.png"><span>ENG</span></div>
            </div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-lat" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

<script>
    const serverList = ["VIP", "VIP2", "LDR", "LDR2", "DropLoad", "LulúStream", "Vidhid", "Vidhide", "StreamWish", "Ok.ru", "Mega", "Filemoon", "Vie.sx", "DoodStream", "MixDrop", "StreamTape", "Upstream", "Vidguard", "Voe.sx", "StreamSB", "Filelions", "Sendvid", "StreamHG", "Mp4Upload"];

    function addInput(lang, val = "", serverName = "VIP", isFirst = false) {
        const cont = document.getElementById(`cont-${lang}`);
        const rows = cont.querySelectorAll('.input-row').length;
        const div = document.createElement('div');
        div.className = 'input-row';

        let options = serverList.map(s => `<option value="${s}" ${s === serverName ? 'selected' : ''}>${s}</option>`).join('');

        div.innerHTML = `
            <select class="${lang}-name">${options}</select>
            <input type="text" class="${lang}-url" placeholder="Pegar enlace" value="${val}">
            ${(rows > 0 || !isFirst) && !isFirst ? `<button class="btn-del" onclick="this.parentElement.remove()">×</button>` : ''}
        `;
        cont.appendChild(div);
    }

    const params = new URLSearchParams(window.location.search);
    const vData = params.get('v');
    if (vData) {
        document.getElementById('ui-player').style.display = 'flex';
        renderPlayer(vData);
    } else {
        document.getElementById('ui-generator').style.display = 'flex';
        ['jap', 'lat', 'cas', 'ing'].forEach(l => addInput(l, "", "VIP", true));
    }

    function renderPlayer(base64) {
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(base64))));
            if (data.bg) document.getElementById('ui-player').style.backgroundImage = `url('${data.bg}')`;
            
            let first = null;
            ['jap', 'lat', 'cas', 'ing'].forEach(l => {
                if (data[l] && data[l].length > 0) {
                    const listCont = document.getElementById(`list-${l}`);
                    listCont.innerHTML = ""; 
                    data[l].forEach(srv => {
                        const item = document.createElement('div');
                        item.className = 'server-item';
                        item.onclick = () => {
                            document.getElementById('main-ifr').src = srv.url;
                            document.getElementById('video-container').classList.add('active');
                            document.getElementById('btn-back').style.display = 'flex';
                        };
                        item.innerHTML = `<span style="color:var(--neon-blue)">▶</span> <span style="font-weight:bold; font-size:10px;">${srv.name}</span>`;
                        listCont.appendChild(item);
                    });
                    document.getElementById(`btn-${l}`).style.display = 'block';
                    if (!first) first = l;
                }
            });
            if (first) switchAudio(first);
        } catch(e) { console.error("Error al cargar datos."); }
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('list-' + lang).classList.add('active');
    }

    function buildLink() {
        const getData = (lang) => {
            const names = document.querySelectorAll(`.${lang}-name`);
            const urls = document.querySelectorAll(`.${lang}-url`);
            let res = [];
            urls.forEach((u, i) => { if (u.value.trim() !== "") res.push({ name: names[i].value, url: u.value.trim() }); });
            return res;
        };
        const finalData = { jap: getData('jap'), lat: getData('lat'), cas: getData('cas'), ing: getData('ing'), bg: document.getElementById('bg-in').value };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(finalData))));
        document.getElementById('out-url').value = window.location.origin + window.location.pathname + "?v=" + encoded;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const inp = document.getElementById('out-url');
        inp.select();
        document.execCommand("copy");
        alert("¡Enlace copiado!");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('main-ifr').src = '';
    }

    // FUNCIÓN PARA RECUPERAR LOS DATOS DEL LINK ANTERIOR
    function importData() {
        const val = document.getElementById('import-url').value;
        try {
            const url = new URL(val);
            const v = url.searchParams.get('v');
            if (v) {
                const data = JSON.parse(decodeURIComponent(escape(atob(v))));
                ['jap', 'lat', 'cas', 'ing'].forEach(l => {
                    document.getElementById(`cont-${l}`).innerHTML = "";
                    if(data[l] && data[l].length > 0) {
                        data[l].forEach((srv, index) => addInput(l, srv.url, srv.name, index === 0));
                    } else {
                        addInput(l, "", "VIP", true);
                    }
                });
                if (data.bg) document.getElementById('bg-in').value = data.bg;
                alert("¡Datos cargados! Ya puedes agregar más enlaces.");
            }
        } catch(e) { alert("Error al importar el enlace. Asegúrate de que sea un link válido del generador."); }
    }
</script>
</body>
</html>
