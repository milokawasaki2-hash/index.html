<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sool Player System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para compresión y así permitir enlaces más largos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .aspect-video-custom {
            aspect-ratio: 16 / 9;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="app" class="max-w-5xl mx-auto">
        <!-- Navegación simple -->
        <nav class="flex gap-4 mb-8 justify-center">
            <button onclick="switchView('generator')" id="btn-gen" class="px-6 py-2 rounded-full bg-blue-600 font-bold hover:bg-blue-700 transition">Generador</button>
            <button onclick="switchView('player')" id="btn-play" class="px-6 py-2 rounded-full glass font-bold hover:bg-slate-700 transition">Vista Reproductor</button>
        </nav>

        <!-- SECCIÓN GENERADOR -->
        <section id="view-generator" class="space-y-6">
            <div class="glass p-6 rounded-2xl">
                <h1 class="text-2xl font-bold mb-4 flex items-center gap-2">
                    <span>⚙️</span> Configuración de Video
                </h1>
                
                <div id="entries-container" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Las entradas se generarán aquí -->
                </div>

                <div class="mt-6 flex flex-col md:flex-row gap-4 items-center">
                    <button onclick="addEntry()" class="w-full md:w-auto px-6 py-3 bg-emerald-600 rounded-xl font-bold hover:bg-emerald-700 transition">
                        + Añadir Servidor (Max 25)
                    </button>
                    <button onclick="generateLink()" class="w-full md:w-auto px-6 py-3 bg-indigo-600 rounded-xl font-bold hover:bg-indigo-700 transition">
                        🔗 Generar Enlace
                    </button>
                </div>
            </div>

            <!-- Resultado del enlace -->
            <div id="result-box" class="hidden glass p-6 rounded-2xl border-indigo-500/50">
                <h2 class="text-lg font-bold mb-2 text-indigo-300">Enlace Generado:</h2>
                <div class="flex gap-2">
                    <input id="generated-url" readonly type="text" class="w-full bg-black/40 p-3 rounded-lg border border-white/10 text-sm font-mono focus:outline-none">
                    <button onclick="copyUrl()" class="px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600">Copiar</button>
                </div>
                <p class="text-xs text-slate-400 mt-2">* Este enlace contiene toda la configuración comprimida en Base64.</p>
            </div>
        </section>

        <!-- SECCIÓN REPRODUCTOR (Interpretador) -->
        <section id="view-player" class="hidden space-y-6">
            <div id="player-container" class="glass rounded-3xl overflow-hidden shadow-2xl">
                <!-- Estado Inicial: Sin Datos -->
                <div id="player-empty" class="p-20 text-center">
                    <div class="text-6xl mb-4">🎬</div>
                    <h2 class="text-2xl font-bold">Esperando datos...</h2>
                    <p class="text-slate-400">Carga un enlace con el parámetro ?data= para ver el contenido.</p>
                </div>

                <!-- Interface Real del Reproductor -->
                <div id="player-active" class="hidden">
                    <!-- Cabecera -->
                    <div class="p-4 bg-black/40 flex justify-between items-center border-b border-white/5">
                        <button onclick="showSelector()" class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                            Volver a la lista
                        </button>
                        <div id="player-current-info" class="text-xs font-bold px-3 py-1 bg-indigo-500/20 text-indigo-400 rounded-full border border-indigo-500/30">
                            VOESX - 1080p
                        </div>
                    </div>

                    <!-- Iframe -->
                    <div class="aspect-video-custom bg-black relative">
                        <iframe id="main-iframe" class="absolute inset-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                    </div>

                    <!-- Selector de Idiomas y Servidores (Modal/Overlay) -->
                    <div id="player-selector" class="p-6 bg-slate-900/95">
                        <h3 class="text-xl font-bold mb-6 text-center">Selecciona una opción de reproducción</h3>
                        
                        <div id="language-groups" class="space-y-8">
                            <!-- Grupos por idioma se inyectan aquí -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- LÓGICA DEL GENERADOR ---
        let entries = [
            { server: 'Streamwish', lang: 'Latino', quality: '1080p', url: '' }
        ];

        function addEntry() {
            if (entries.length >= 25) return;
            entries.push({ server: 'Streamwish', lang: 'Latino', quality: '1080p', url: '' });
            renderEntries();
        }

        function removeEntry(index) {
            entries.splice(index, 1);
            renderEntries();
        }

        function updateEntry(index, field, value) {
            entries[index][field] = value;
        }

        function renderEntries() {
            const container = document.getElementById('entries-container');
            container.innerHTML = entries.map((e, i) => `
                <div class="flex flex-wrap gap-2 p-4 bg-white/5 rounded-xl border border-white/10 items-end">
                    <div class="flex-1 min-w-[120px]">
                        <label class="block text-xs text-slate-400 mb-1">Servidor</label>
                        <select onchange="updateEntry(${i}, 'server', this.value)" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-sm">
                            <option ${e.server === 'Streamwish' ? 'selected' : ''}>Streamwish</option>
                            <option ${e.server === 'Filemoon' ? 'selected' : ''}>Filemoon</option>
                            <option ${e.server === 'Voesx' ? 'selected' : ''}>Voesx</option>
                            <option ${e.server === 'Doodstream' ? 'selected' : ''}>Doodstream</option>
                            <option ${e.server === 'Streamtape' ? 'selected' : ''}>Streamtape</option>
                            <option ${e.server === 'Netu' ? 'selected' : ''}>Netu</option>
                            <option ${e.server === 'Vidhide' ? 'selected' : ''}>Vidhide</option>
                            <option ${e.server === 'Plustream' ? 'selected' : ''}>Plustream</option>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[120px]">
                        <label class="block text-xs text-slate-400 mb-1">Idioma</label>
                        <select onchange="updateEntry(${i}, 'lang', this.value)" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-sm">
                            <option ${e.lang === 'Latino' ? 'selected' : ''}>Latino</option>
                            <option ${e.lang === 'Español' ? 'selected' : ''}>Español</option>
                            <option ${e.lang === 'Inglés' ? 'selected' : ''}>Inglés</option>
                            <option ${e.lang === 'Japonés' ? 'selected' : ''}>Japonés</option>
                            <option ${e.lang === 'Otros' ? 'selected' : ''}>Otros</option>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[80px]">
                        <label class="block text-xs text-slate-400 mb-1">Calidad</label>
                        <input type="text" value="${e.quality}" oninput="updateEntry(${i}, 'quality', this.value)" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-sm">
                    </div>
                    <div class="flex-[2] min-w-[200px]">
                        <label class="block text-xs text-slate-400 mb-1">URL Embed</label>
                        <input type="text" value="${e.url}" placeholder="https://..." oninput="updateEntry(${i}, 'url', this.value)" class="w-full bg-slate-800 p-2 rounded border border-white/10 text-sm">
                    </div>
                    <button onclick="removeEntry(${i})" class="p-2 bg-red-500/20 text-red-400 rounded hover:bg-red-500/40 transition">🗑️</button>
                </div>
            `).join('');
        }

        function generateLink() {
            try {
                // Filtramos entradas vacías
                const data = entries.filter(e => e.url.trim() !== "");
                if (data.length === 0) {
                    alert("Agrega al menos una URL de video.");
                    return;
                }

                // Codificación: JSON -> GZIP -> Base64 Safe
                const jsonStr = JSON.stringify(data);
                const compressed = pako.deflate(jsonStr);
                const base64 = btoa(String.fromCharCode.apply(null, compressed))
                                .replace(/\+/g, '-')
                                .replace(/\//g, '_')
                                .replace(/=+$/, '');

                const baseUrl = window.location.origin + window.location.pathname;
                const fullUrl = `${baseUrl}?data=${base64}`;

                document.getElementById('generated-url').value = fullUrl;
                document.getElementById('result-box').classList.remove('hidden');
                
                // Animación de scroll
                document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                alert("Error al generar el enlace.");
            }
        }

        function copyUrl() {
            const el = document.getElementById('generated-url');
            el.select();
            document.execCommand('copy');
            alert("¡Enlace copiado al portapapeles!");
        }

        // --- LÓGICA DEL REPRODUCTOR ---
        let currentData = [];

        function initPlayerFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const rawData = params.get('data');

            if (!rawData) return;

            try {
                // Decodificación: Base64 Safe -> Decompress -> JSON
                const base64 = rawData.replace(/-/g, '+').replace(/_/g, '/');
                const binaryStr = atob(base64);
                const charData = binaryStr.split('').map(x => x.charCodeAt(0));
                const binData = new Uint8Array(charData);
                const decompressed = pako.inflate(binData, { to: 'string' });
                
                currentData = JSON.parse(decompressed);
                renderPlayerUI();
                switchView('player');
            } catch (err) {
                console.error("Error decodificando datos:", err);
                alert("El enlace parece estar dañado o incompleto.");
            }
        }

        function renderPlayerUI() {
            document.getElementById('player-empty').classList.add('hidden');
            document.getElementById('player-active').classList.remove('hidden');
            
            const groupsContainer = document.getElementById('language-groups');
            groupsContainer.innerHTML = "";

            // Agrupar por idioma
            const languages = [...new Set(currentData.map(d => d.lang))];
            
            languages.forEach(lang => {
                const langItems = currentData.filter(d => d.lang === lang);
                const section = document.createElement('div');
                section.innerHTML = `
                    <h4 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-3 border-l-2 border-indigo-500 pl-3">${lang}</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                        ${langItems.map(item => `
                            <button onclick="playVideo('${item.url}', '${item.server}', '${item.quality}')" 
                                    class="bg-white/5 hover:bg-indigo-600 border border-white/10 p-3 rounded-xl transition text-left group">
                                <div class="text-xs text-slate-400 group-hover:text-indigo-200">${item.server}</div>
                                <div class="font-bold text-sm">${item.quality}</div>
                            </button>
                        `).join('')}
                    </div>
                `;
                groupsContainer.appendChild(section);
            });
        }

        function playVideo(url, server, quality) {
            const iframe = document.getElementById('main-iframe');
            const info = document.getElementById('player-current-info');
            const selector = document.getElementById('player-selector');

            iframe.src = url;
            info.innerText = `${server.toUpperCase()} - ${quality}`;
            
            // Ocultar selector con animación simple
            selector.classList.add('hidden');
        }

        function showSelector() {
            document.getElementById('player-selector').classList.remove('hidden');
            document.getElementById('main-iframe').src = "";
        }

        // --- UTILIDADES DE VISTA ---
        function switchView(view) {
            const gen = document.getElementById('view-generator');
            const play = document.getElementById('view-player');
            const btnGen = document.getElementById('btn-gen');
            const btnPlay = document.getElementById('btn-play');

            if (view === 'generator') {
                gen.classList.remove('hidden');
                play.classList.add('hidden');
                btnGen.className = "px-6 py-2 rounded-full bg-blue-600 font-bold hover:bg-blue-700 transition";
                btnPlay.className = "px-6 py-2 rounded-full glass font-bold hover:bg-slate-700 transition";
            } else {
                gen.classList.add('hidden');
                play.classList.remove('hidden');
                btnPlay.className = "px-6 py-2 rounded-full bg-blue-600 font-bold hover:bg-blue-700 transition";
                btnGen.className = "px-6 py-2 rounded-full glass font-bold hover:bg-slate-700 transition";
            }
        }

        // Inicialización
        window.onload = () => {
            renderEntries();
            initPlayerFromUrl();
        };
    </script>
</body>
</html>
