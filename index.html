<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MULTI-AUDIO PRO | Panel Control</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: #0a0a0c;
            --border-color: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #fff; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- CONTENEDOR PRINCIPAL (RESPONSIVE) --- */
        #ui-generator {
            width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 15px; box-sizing: border-box;
        }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); 
            width: 100%; max-width: 900px; /* Más ancho para PC */
            height: 90vh; display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        .main-title {
            text-align: center; color: var(--neon-blue); 
            margin: 0 0 15px 0; font-size: 22px; 
            font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
        }

        /* BARRA DE IMPORTACIÓN */
        .import-box {
            background: #050505; padding: 12px; border-radius: 10px; margin-bottom: 15px;
            border: 1px dashed #333; display: flex; gap: 10px; align-items: center;
        }
        .import-box input { flex: 1; }
        .btn-import { 
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px;
        }

        /* --- CUADRÍCULA DE SERVIDORES (PC: 2 COL / MOVIL: 1 COL) --- */
        #inputs-scroll-area {
            overflow-y: auto; flex: 1; padding-right: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); /* MAGIA PARA PC */
            gap: 15px;
        }

        .section-group { 
            background: #050505; padding: 12px; border-radius: 10px; border: 1px solid #111;
            display: flex; flex-direction: column;
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .section-label { color: var(--neon-blue); font-size: 11px; font-weight: 800; text-transform: uppercase; }
        
        .btn-add { background: var(--neon-blue); border: none; color: #000; border-radius: 4px; padding: 2px 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .input-list { display: flex; flex-direction: column; gap: 6px; }
        .input-row { display: flex; gap: 5px; }
        .btn-del { background: #ff3333; border: none; color: white; border-radius: 4px; padding: 0 10px; cursor: pointer; }

        input { 
            background: #000; border: 1px solid #222; 
            border-radius: 6px; color: #fff; font-size: 12px; padding: 10px; outline: none; 
        }
        input:focus { border-color: var(--neon-blue); }

        /* ZONA DE FONDO Y GENERAR (AHORA JUNTOS) */
        .config-footer {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #1a1a1a;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-main { 
            width: 100%; padding: 15px; background: var(--neon-blue); border: none; 
            font-weight: 900; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; font-size: 13px; color: #000; letter-spacing: 1px;
        }

        /* BOX LINK RESULTADO */
        #box-link { 
            display:none; background: #001a21; border: 1px solid var(--neon-blue); 
            padding: 12px; border-radius: 8px; margin-top: 10px;
        }

        /* --- PLAYER (SIN CAMBIOS) --- */
        #ui-player { display: none; width: 100%; height: 100vh; justify-content: center; align-items: center; position: relative; background-size: cover; background-position: center; }
        #overlay-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.95) 100%); z-index: 1; }
        #content-wrapper { z-index: 10; width: 95%; max-width: 800px; text-align: center; }
        .tabs-audio { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; display: none; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .tab-btn img { width: 35px; height: 22px; border-radius: 3px; display: block; margin: 0 auto 4px; }
        .tab-btn span { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .server-list { display: none; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 5px; }
        .server-list.active { display: grid; }
        .server-item { background: rgba(10, 10, 12, 0.98); border-radius: 6px; padding: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 100; background: #000; }
        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }
        #btn-back { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: var(--neon-blue); border: 1px solid var(--neon-blue); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 200; display: none; align-items: center; justify-content: center; }

        /* RESPONSIVE PARA MOVILES */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
            .card { height: 95vh; padding: 12px; }
            .import-box { flex-direction: column; }
            .import-box button { width: 100%; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ui-generator">
        <div class="card">
            <h2 class="main-title">SISTEMA MULTI-AUDIO PRO</h2>
            
            <div class="import-box">
                <input type="text" id="import-url" placeholder="Pega el enlace anterior aquí para editar...">
                <button class="btn-import" onclick="importData()">CARGAR DATOS</button>
            </div>

            <div id="inputs-scroll-area">
                <div class="grid-container">
                    <div class="section-group">
                        <div class="section-header"><span class="section-label">🇯🇵 Japonés</span><button class="btn-add" onclick="addInput('jap')">+</button></div>
                        <div id="cont-jap" class="input-list"></div>
                    </div>
                    <div class="section-group">
                        <div class="section-header"><span class="section-label">🇲🇽 Latino</span><button class="btn-add" onclick="addInput('lat')">+</button></div>
                        <div id="cont-lat" class="input-list"></div>
                    </div>
                    <div class="section-group">
                        <div class="section-header"><span class="section-label">🇪🇸 Castellano</span><button class="btn-add" onclick="addInput('cas')">+</button></div>
                        <div id="cont-cas" class="input-list"></div>
                    </div>
                    <div class="section-group">
                        <div class="section-header"><span class="section-label">🇺🇸 Inglés</span><button class="btn-add" onclick="addInput('ing')">+</button></div>
                        <div id="cont-ing" class="input-list"></div>
                    </div>
                </div>
            </div>
            
            <div class="config-footer">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <span class="section-label">Imagen de Fondo (URL)</span>
                    <input type="text" id="bg-in" placeholder="https://tu-imagen.jpg/poster.jpg">
                </div>
                <button class="btn-main" onclick="buildLink()">GENERAR ENLACE ACTUALIZADO</button>
                
                <div id="box-link">
                    <input type="text" id="out-url" readonly style="margin-bottom: 8px; font-size: 11px; color: var(--neon-blue); text-align: center; width: 100%; border-color: var(--neon-blue);">
                    <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); border:none; padding: 12px; font-weight:bold; border-radius: 6px; color: #000; cursor:pointer;">COPIAR LINK AL PORTAPAPELES</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span></div>
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>Latino</span></div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')"><img src="https://flagcdn.com/w80/es.png"><span>Español</span></div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')"><img src="https://flagcdn.com/w80/us.png"><span>Inglés</span></div>
            </div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-lat" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>
        <div id="video-container"><iframe id="main-ifr" src="" allowfullscreen></iframe></div>
    </div>

<script>
    function addInput(lang, value = "") {
        const container = document.getElementById(`cont-${lang}`);
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<input type="text" class="${lang}-in" placeholder="Link servidor..." value="${value}"><button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    function importData() {
        const urlString = document.getElementById('import-url').value;
        try {
            const url = new URL(urlString);
            const v = url.searchParams.get('v');
            const data = JSON.parse(decodeURIComponent(escape(atob(v))));
            ['jap', 'lat', 'cas', 'ing'].forEach(l => document.getElementById(`cont-${l}`).innerHTML = "");
            if (data.jap) data.jap.forEach(val => addInput('jap', val));
            if (data.lat) data.lat.forEach(val => addInput('lat', val));
            if (data.cas) data.cas.forEach(val => addInput('cas', val));
            if (data.ing) data.ing.forEach(val => addInput('ing', val));
            if (data.bg) document.getElementById('bg-in').value = data.bg;
        } catch (e) { alert("Error al cargar datos."); }
    }

    const q = new URLSearchParams(window.location.search);
    const v = q.get('v');
    if (v) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(v))));
            if (data.bg) document.getElementById('ui-player').style.backgroundImage = `url('${data.bg}')`;
            ['jap', 'lat', 'cas', 'ing'].forEach(l => {
                if (data[l] && data[l].length > 0) {
                    const list = document.getElementById(`list-${l}`);
                    data[l].forEach((url, idx) => {
                        if(url.trim() !== ""){
                            const item = document.createElement('div');
                            item.className = 'server-item';
                            item.onclick = () => { document.getElementById('main-ifr').src = url; document.getElementById('video-container').classList.add('active'); document.getElementById('btn-back').style.display='flex'; };
                            item.innerHTML = `<span style="color:var(--neon-blue)">▶</span> <span style="font-size:12px">OPCIÓN ${idx+1}</span>`;
                            list.appendChild(item);
                            document.getElementById(`btn-${l}`).style.display = 'block';
                        }
                    });
                }
            });
            switchAudio('jap');
        } catch(e) {}
    } else {
        ['jap', 'lat', 'cas', 'ing'].forEach(l => addInput(l));
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        if(document.getElementById('btn-' + lang)) document.getElementById('btn-' + lang).classList.add('active');
        if(document.getElementById('list-' + lang)) document.getElementById('list-' + lang).classList.add('active');
    }

    function buildLink() {
        const getVals = cls => Array.from(document.querySelectorAll(cls)).map(i => i.value.trim()).filter(v => v !== "");
        const data = { jap: getVals('.jap-in'), lat: getVals('.lat-in'), cas: getVals('.cas-in'), ing: getVals('.ing-in'), bg: document.getElementById('bg-in').value };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        document.getElementById('out-url').value = window.location.origin + window.location.pathname + "?v=" + encoded;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const inp = document.getElementById('out-url');
        inp.select();
        document.execCommand("copy");
        alert("¡Link copiado!");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('main-ifr').src = '';
    }
</script>
</body>
</html>
