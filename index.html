<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Múltiple Audio V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; overflow: hidden; }

        /* --- SECCIÓN ADMINISTRADOR --- */
        #admin { 
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px;
            background: #0a0a0a; overflow-y: auto;
        }
        .admin-box { background: #111; padding: 20px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #222; }
        .field { margin-bottom: 8px; }
        label { display: block; font-size: 9px; text-transform: uppercase; color: #555; margin-bottom: 3px; font-weight: 800; }
        input { width: 100%; padding: 7px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; font-size: 11px; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn-go { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 5px; font-weight: 800; margin-top: 10px; cursor: pointer; color: #000; font-size: 12px; }

        /* --- INTERFAZ DEL REPRODUCTOR (V4 ULTRA COMPACTA) --- */
        #player { 
            display: none; width: 100%; height: 100vh; position: relative; 
            background-size: cover; background-position: center; flex-direction: column;
        }
        #player::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #000 65%, rgba(0,0,0,0.8) 100%); z-index: 1; }

        .ui-content {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; padding: 8px 15px;
            max-width: 500px; margin: 0 auto;
        }

        /* TÍTULO V4: MINIMALISTA Y UNA SOLA LÍNEA */
        header { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        
        h1 { 
            font-size: 13px; /* Tamaño reducido al máximo */
            font-weight: 600; 
            margin: 0 0 5px 0; 
            color: #aaa;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; /* Evita saltos de línea */
            max-width: 100%;
        }
        
        /* Selectores de Idioma en línea */
        .lang-flex { display: flex; gap: 5px; }
        .lang-btn { 
            background: var(--card); border: 1px solid var(--border); padding: 4px 8px; 
            border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; 
            font-size: 8px; font-weight: 800; transition: 0.2s;
        }
        .lang-btn img { width: 11px; height: 8px; border-radius: 1px; }
        .lang-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .label-mini { font-size: 7px; color: #444; font-weight: 900; text-transform: uppercase; margin: 6px 0 4px; letter-spacing: 0.5px; }

        /* Lista de Servidores Slim V4 */
        .server-container { 
            display: none; flex-direction: column; gap: 4px; 
            overflow-y: auto; flex-grow: 1; padding-bottom: 10px;
            scrollbar-width: none;
        }
        .server-container.active { display: flex; }
        .server-container::-webkit-scrollbar { display: none; }

        .server-card { 
            background: rgba(15, 15, 15, 0.9); border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 5px; 
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; min-height: 40px;
        }
        .server-card:active { transform: scale(0.98); background: var(--accent); color: #000; }
        
        .s-box { display: flex; align-items: center; gap: 8px; }
        .s-play { color: var(--accent); font-size: 8px; }
        .s-name { font-size: 11px; font-weight: 700; }
        .s-desc { font-size: 7px; opacity: 0.5; text-transform: uppercase; display: block; margin-top: -2px; }
        
        .hd-tag { font-size: 7px; border: 1px solid rgba(255,255,255,0.15); padding: 1px 4px; border-radius: 2px; font-weight: 800; color: #fff; }

        /* Video Layer */
        #video-view { 
            position: absolute; inset: 0; background: #000; z-index: 100; 
            display: none; opacity: 0; transition: opacity 0.3s;
        }
        #video-view.active { display: block; opacity: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-close {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: rgba(0,0,0,0.6); border: 1px solid var(--border); border-radius: 50%;
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- GENERADOR V4 -->
    <div id="admin">
        <div class="admin-box">
            <h2 style="margin:0 0 12px; color:var(--accent); font-size:14px; text-align:center">GENERADOR MULTIAUDIO V4</h2>
            <div class="field"><label>Título</label><input type="text" id="t-in" placeholder="Nombre de la obra"></div>
            <div class="field"><label>Imagen Fondo (URL)</label><input type="text" id="bg-in" placeholder="https://..."></div>
            <div class="field">
                <div style="display:flex; justify-content:space-between"><label>Audio Latino</label><button onclick="addInput('lat')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold">+</button></div>
                <div id="cont-lat"><input type="text" class="lat-val" placeholder="Enlace Servidor"></div>
            </div>
            <div class="field">
                <div style="display:flex; justify-content:space-between"><label>Audio Japonés</label><button onclick="addInput('jap')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold">+</button></div>
                <div id="cont-jap"><input type="text" class="jap-val" placeholder="Enlace Servidor"></div>
            </div>
            <button class="btn-go" onclick="build()">GENERAR ENLACE FINAL</button>
            <div id="out-box" style="display:none; margin-top:10px">
                <input type="text" id="final-url" readonly style="font-size:9px">
                <button class="btn-go" style="background:#fff" onclick="copyUrl()">COPIAR LINK</button>
            </div>
        </div>
    </div>

    <!-- PLAYER V4 -->
    <div id="player">
        <div id="btn-close" style="display:none" onclick="killVid()">✕</div>
        
        <div class="ui-content">
            <header>
                <h1 id="movie-title">Título</h1>
                <div class="lang-flex">
                    <div class="lang-btn" id="l-lat" onclick="tab('lat')"><img src="https://flagcdn.com/w40/mx.png"> <span>LATINO</span></div>
                    <div class="lang-btn" id="l-jap" onclick="tab('jap')"><img src="https://flagcdn.com/w40/jp.png"> <span>JAPONÉS</span></div>
                </div>
            </header>
            
            <div class="label-mini">Servidores disponibles:</div>
            
            <div id="list-lat" class="server-container"></div>
            <div id="list-jap" class="server-container"></div>
        </div>

        <div id="video-view">
            <iframe id="main-ifr" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

<script>
    function addInput(l) {
        const d = document.createElement('div');
        d.style.display = 'flex'; d.style.gap = '4px'; d.style.marginTop = '4px';
        d.innerHTML = `<input type="text" class="${l}-val" placeholder="Enlace"><button onclick="this.parentElement.remove()" style="background:#333; border:none; color:#fff; border-radius:4px; padding:0 6px; font-size:10px">✕</button>`;
        document.getElementById('cont-'+l).appendChild(d);
    }

    const up = new URLSearchParams(window.location.search);
    const uv = up.get('v');

    if(uv) {
        document.getElementById('admin').style.display='none';
        document.getElementById('player').style.display='flex';
        try {
            const d = JSON.parse(decodeURIComponent(escape(atob(uv))));
            document.getElementById('movie-title').innerText = d.t || "MOVIE";
            if(d.bg) document.getElementById('player').style.backgroundImage = `url('${d.bg}')`;
            
            ['lat','jap'].forEach(l => {
                const links = d[l].filter(u => u);
                if(links.length > 0) {
                    const box = document.getElementById('list-'+l);
                    links.forEach((url, i) => {
                        const card = document.createElement('div');
                        card.className = 'server-card';
                        card.onclick = () => {
                            document.getElementById('main-ifr').src = url;
                            document.getElementById('video-view').classList.add('active');
                            document.getElementById('btn-close').style.display = 'flex';
                        };
                        card.innerHTML = `
                            <div class="s-box">
                                <span class="s-play">▶</span>
                                <div>
                                    <span class="s-name">Opción ${i+1}</span>
                                    <span class="s-desc">${l=='lat'?'Latino':'Subtitulado'}</span>
                                </div>
                            </div>
                            <span class="hd-tag">1080P</span>
                        `;
                        box.appendChild(card);
                    });
                } else { document.getElementById('l-'+l).style.display = 'none'; }
            });
            tab(d.lat[0] ? 'lat' : 'jap');
        } catch(e){}
    }

    function tab(l) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-container').forEach(g => g.classList.remove('active'));
        document.getElementById('l-'+l).classList.add('active');
        document.getElementById('list-'+l).classList.add('active');
    }

    function build() {
        const gV = c => Array.from(document.querySelectorAll(c)).map(i => i.value.trim());
        const d = { t: document.getElementById('t-in').value, bg: document.getElementById('bg-in').value, lat: gV('.lat-val'), jap: gV('.jap-val') };
        const e = btoa(unescape(encodeURIComponent(JSON.stringify(d))));
        document.getElementById('final-url').value = window.location.origin + window.location.pathname + "?v=" + e;
        document.getElementById('out-box').style.display = 'block';
    }

    function copyUrl() { 
        const r = document.getElementById('final-url'); 
        r.select(); 
        document.execCommand('copy'); 
    }
    
    function killVid() { 
        document.getElementById('video-view').classList.remove('active'); 
        document.getElementById('main-ifr').src = ""; 
        document.getElementById('btn-close').style.display = 'none';
    }
</script>
</body>
</html>
