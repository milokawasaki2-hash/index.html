<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sool Player PRO</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
}

/* PANEL */
#panel{
  padding:20px;
}

input, select{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#ff3d00;
  color:#fff;
}

.server-box{
  background:#1c1c1c;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* PLAYER */
#player{
  display:none;
  padding:20px;
}

.header{
  background-size:cover;
  padding:50px;
}

.langs button{
  margin:5px;
}

.server{
  background:#222;
  padding:10px;
  margin:5px;
  border-radius:5px;
  cursor:pointer;
}

iframe{
  width:100%;
  height:400px;
  border:none;
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h2>🎬 Generador</h2>

  <input id="title" placeholder="Título"><br>
  <input id="poster" placeholder="Imagen URL"><br>

  <div id="servers"></div>

  <button onclick="addServer()">+ Agregar Servidor</button>
  <button onclick="generate()">Generar Link</button>

  <p id="result"></p>
</div>

<!-- PLAYER -->
<div id="player">
  <div class="header" id="bg">
    <h1 id="ptitle"></h1>
  </div>

  <div class="langs" id="langs"></div>

  <div id="list"></div>

  <div id="video"></div>
</div>

<script>
function addServer(){
  let div = document.createElement("div");
  div.className="server-box";

  div.innerHTML=`
    <input placeholder="Servidor">
    <select>
      <option>Latino</option>
      <option>Español</option>
      <option>Inglés</option>
      <option>Japonés</option>
      <option>Otros</option>
    </select>
    <input placeholder="Calidad">
    <input placeholder="URL">
  `;

  document.getElementById("servers").appendChild(div);
}

function generate(){
  let title = document.getElementById("title").value;
  let poster = document.getElementById("poster").value;

  let data = {
    title,
    poster,
    list:[]
  };

  document.querySelectorAll(".server-box").forEach(box=>{
    let inputs = box.querySelectorAll("input,select");
    data.list.push({
      server:inputs[0].value,
      lang:inputs[1].value,
      quality:inputs[2].value,
      url:inputs[3].value
    });
  });

  let encoded = btoa(JSON.stringify(data));

  let link = location.pathname + "?data=" + encoded;

  document.getElementById("result").innerHTML = link;
}

/* PLAYER LOGIC */
function loadPlayer(){
  let params = new URLSearchParams(location.search);
  let data = params.get("data");

  if(!data) return;

  document.getElementById("panel").style.display="none";
  document.getElementById("player").style.display="block";

  let json = JSON.parse(atob(data));

  document.getElementById("ptitle").innerText = json.title;
  document.getElementById("bg").style.backgroundImage = `url(${json.poster})`;

  let langs = [...new Set(json.list.map(x=>x.lang))];

  let langsDiv = document.getElementById("langs");

  langs.forEach(lang=>{
    let btn = document.createElement("button");
    btn.innerText = lang;
    btn.onclick=()=>showList(lang, json.list);
    langsDiv.appendChild(btn);
  });

  showList(langs[0], json.list);
}

function showList(lang, list){
  let container = document.getElementById("list");
  container.innerHTML="";

  list.filter(x=>x.lang===lang).forEach(item=>{
    let div = document.createElement("div");
    div.className="server";

    div.innerText = item.server+" - "+item.quality;

    div.onclick=()=>{
      document.getElementById("video").innerHTML =
        `<iframe src="${item.url}" allowfullscreen></iframe>`;
    };

    container.appendChild(div);
  });
}

loadPlayer();
</script>

</body>
</html>
