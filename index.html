<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

/* PANEL */
#panel{
  padding:20px;
  max-width:900px;
  margin:auto;
}

h2{margin-bottom:10px;}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
  background:#1c1c1c;
  color:#fff;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:5px 0;
}

.btn-main{
  background:#ff3d00;
  color:#fff;
}

.server-box{
  background:#141414;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* PLAYER */
#player{
  display:none;
}

.header{
  height:200px;
  background-size:cover;
  display:flex;
  align-items:end;
  padding:20px;
}

.langs{
  padding:10px;
}

.langs button{
  margin:5px;
  background:#222;
  color:#fff;
}

.server{
  background:#1c1c1c;
  padding:10px;
  margin:8px;
  border-radius:6px;
  cursor:pointer;
}

iframe{
  width:100%;
  height:400px;
  border:none;
}

/* LINK BOX */
#result{
  background:#111;
  padding:10px;
  margin-top:10px;
  word-break:break-all;
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h2>🎬 Generador PRO</h2>

  <input id="title" placeholder="Título">
  <input id="poster" placeholder="Imagen URL">

  <div id="servers"></div>

  <button class="btn-main" onclick="addServer()">+ Agregar Servidor</button>
  <button class="btn-main" onclick="generate()">Generar Link</button>

  <div id="result"></div>
  <button onclick="copyLink()">Copiar Link</button>
</div>

<!-- PLAYER -->
<div id="player">
  <div class="header" id="bg">
    <h1 id="ptitle"></h1>
  </div>

  <div class="langs" id="langs"></div>

  <div id="list"></div>
  <div id="video"></div>
</div>

<script>
function addServer(){
  let div = document.createElement("div");
  div.className="server-box";

  div.innerHTML=`
    <input placeholder="Servidor">
    <select>
      <option>Latino</option>
      <option>Español</option>
      <option>Inglés</option>
      <option>Japonés</option>
      <option>Otros</option>
    </select>
    <input placeholder="Calidad">
    <input placeholder="URL embed">
  `;

  document.getElementById("servers").appendChild(div);
}

function generate(){
  let data = {
    title:document.getElementById("title").value,
    poster:document.getElementById("poster").value,
    list:[]
  };

  document.querySelectorAll(".server-box").forEach(box=>{
    let i = box.querySelectorAll("input,select");
    data.list.push({
      server:i[0].value,
      lang:i[1].value,
      quality:i[2].value,
      url:i[3].value
    });
  });

  let encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));

  let fullURL = window.location.origin + window.location.pathname + "?data=" + encoded;

  document.getElementById("result").innerText = fullURL;
}

function copyLink(){
  let text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("Link copiado 🔥");
}

/* PLAYER */
function loadPlayer(){
  let params = new URLSearchParams(location.search);
  let data = params.get("data");

  if(!data) return;

  document.getElementById("panel").style.display="none";
  document.getElementById("player").style.display="block";

  let json = JSON.parse(decodeURIComponent(escape(atob(data))));

  document.getElementById("ptitle").innerText = json.title;
  document.getElementById("bg").style.backgroundImage = `url(${json.poster})`;

  let langs = [...new Set(json.list.map(x=>x.lang))];

  langs.forEach(lang=>{
    let btn = document.createElement("button");
    btn.innerText = lang;
    btn.onclick=()=>showList(lang, json.list);
    document.getElementById("langs").appendChild(btn);
  });

  showList(langs[0], json.list);
}

function showList(lang, list){
  let container = document.getElementById("list");
  container.innerHTML="";

  list.filter(x=>x.lang===lang).forEach(item=>{
    let div = document.createElement("div");
    div.className="server";

    div.innerText = item.server + " - " + item.quality;

    div.onclick=()=>{
      document.getElementById("video").innerHTML =
        `<iframe src="${item.url}" allowfullscreen></iframe>`;
    };

    container.appendChild(div);
  });
}

loadPlayer();
</script>

</body>
</html>
