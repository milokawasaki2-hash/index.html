<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Engine | Ultra Premium</title>
    <!-- Google Fonts para un look moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.4);
            --bg-body: #050505;
            --glass: rgba(15, 15, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR (ADMIN PANEL) --- */
        #ui-generator {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 20px; overflow-y: auto;
            background: radial-gradient(circle at top right, #0a192f, #050505);
        }

        .admin-card {
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .admin-header h2 { margin: 0 0 5px; font-weight: 800; font-size: 20px; color: var(--primary); }
        .admin-header p { margin: 0 0 20px; font-size: 13px; color: var(--text-dim); }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--text-dim); letter-spacing: 1px; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 13px;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px var(--primary-glow); }

        .btn-circle { width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; }
        .btn-del { background: rgba(255, 50, 50, 0.1); color: #ff5050; border: 1px solid rgba(255, 50, 50, 0.2); }

        .btn-generate {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: #000; font-weight: 800;
            font-size: 14px; cursor: pointer; margin-top: 10px;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            transition: transform 0.2s;
        }
        .btn-generate:active { transform: scale(0.98); }

        #box-link { display: none; margin-top: 20px; padding: 15px; background: rgba(0,212,255,0.05); border-radius: 12px; border: 1px dashed var(--primary); }

        /* --- PLAYER INTERFACE --- */
        #ui-player {
            display: none; width: 100%; height: 100vh;
            justify-content: center; align-items: center;
            position: relative; background-size: cover; background-position: center;
        }

        #ui-player::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(0deg, #050505 10%, rgba(5,5,5,0.6) 50%, rgba(5,5,5,0.9) 100%);
            z-index: 1;
        }

        .player-container { z-index: 10; width: 90%; max-width: 400px; text-align: center; }

        .movie-info { margin-bottom: 25px; }
        .movie-info h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .movie-info p { margin: 5px 0 0; color: var(--primary); font-size: 14px; font-weight: 600; opacity: 0.8; }

        /* Banderas Estilo Chip */
        .tabs-audio { display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 100px; cursor: pointer;
            display: none; align-items: center; gap: 8px; transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .tab-btn img { width: 18px; height: 12px; border-radius: 2px; }
        .tab-btn span { font-size: 12px; font-weight: 600; color: var(--text-dim); }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); }
        .tab-btn.active span { color: #000; }

        /* Lista de Servidores Premium */
        .server-list { display: none; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; padding: 5px; scrollbar-width: none; }
        .server-list.active { display: flex; }

        .server-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .server-card:hover { 
            transform: translateX(5px); 
            background: rgba(255,255,255,0.1); 
            border-color: var(--primary); 
        }

        .server-meta { display: flex; align-items: center; gap: 15px; }
        .play-btn-ui { 
            width: 32px; height: 32px; background: rgba(0,212,255,0.15); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 12px;
        }
        .server-name h4 { margin: 0; font-size: 14px; font-weight: 700; }
        .server-name span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .badge-hd { background: #1ed760; color: #000; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; }

        /* Video Area */
        #video-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; opacity: 0; visibility: hidden;
            transition: opacity 0.5s;
        }
        #video-layer.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Botón de Cierre Minimalista (X) */
        #btn-close {
            position: absolute; top: 25px; right: 25px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; opacity: 0; transition: all 0.4s;
        }
        #btn-close.visible { opacity: 1; }
        #btn-close:hover { background: var(--primary); color: #000; transform: rotate(90deg); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- INTERFAZ ADMINISTRADOR -->
    <div id="ui-generator">
        <div class="admin-card">
            <div class="admin-header">
                <h2>STREAM ENGINE V2</h2>
                <p>Configura tu reproductor personalizado</p>
            </div>
            
            <div style="max-height: 400px; overflow-y: auto; padding-right: 10px;">
                <div class="input-group">
                    <label>Título de la Película / Serie</label>
                    <input type="text" id="title-in" placeholder="Ej: Avengers: Endgame">
                </div>

                <div class="input-group">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:8px;">
                        <label>Servidores Latino</label>
                        <button class="btn-circle" onclick="addIn('lat')">+</button>
                    </div>
                    <div id="box-lat" class="input-list"><input type="text" class="lat-in" placeholder="URL Servidor"></div>
                </div>

                <div class="input-group">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:8px;">
                        <label>Servidores Japonés</label>
                        <button class="btn-circle" onclick="addIn('jap')">+</button>
                    </div>
                    <div id="box-jap" class="input-list"><input type="text" class="jap-in" placeholder="URL Servidor"></div>
                </div>

                <div class="input-group">
                    <label>Imagen de Fondo (Vertical recomendado)</label>
                    <input type="text" id="bg-in" placeholder="https://url-de-la-imagen.jpg">
                </div>
            </div>

            <button class="btn-generate" onclick="generate()">CREAR EXPERIENCIA</button>

            <div id="box-link">
                <input type="text" id="res-url" readonly style="border:none; background:transparent; text-align:center; width:100%; font-size:10px; color:var(--primary);">
                <button onclick="copyRes()" style="width:100%; margin-top:10px; padding:8px; background:var(--primary); border:none; border-radius:8px; font-weight:800; cursor:pointer; color:#000;">COPIAR ENLACE</button>
            </div>
        </div>
    </div>

    <!-- INTERFAZ REPRODUCTOR -->
    <div id="ui-player" onmousemove="handleMotion()" ontouchstart="handleMotion()">
        <div id="btn-close" onclick="exitVideo()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>

        <div class="player-container">
            <div class="movie-info">
                <h1 id="movie-title">Cargando...</h1>
                <p>SELECCIONA UN SERVIDOR</p>
            </div>

            <div class="tabs-audio">
                <div class="tab-btn" id="t-lat" onclick="setLang('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>Latino</span></div>
                <div class="tab-btn" id="t-jap" onclick="setLang('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span></div>
            </div>

            <div id="l-lat" class="server-list"></div>
            <div id="l-jap" class="server-list"></div>
        </div>

        <div id="video-layer" onmousemove="handleMotion()" ontouchstart="handleMotion()">
            <iframe id="ifr" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

<script>
    let timer;

    function handleMotion() {
        const btn = document.getElementById('btn-close');
        if (!document.getElementById('video-layer').classList.contains('active')) return;

        btn.classList.add('visible');
        clearTimeout(timer);
        timer = setTimeout(() => btn.classList.remove('visible'), 3000);
    }

    function addIn(lang) {
        const container = document.getElementById(`box-${lang}`);
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<input type="text" class="${lang}-in" placeholder="URL"><button class="btn-circle btn-del" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    // Lógica de URL
    const params = new URLSearchParams(window.location.search);
    const config = params.get('data');

    if (config) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        try {
            const d = JSON.parse(decodeURIComponent(escape(atob(config))));
            document.getElementById('movie-title').innerText = d.title || "PELÍCULA";
            if (d.bg) document.getElementById('ui-player').style.backgroundImage = `url('${d.bg}')`;

            ['lat', 'jap'].forEach(lang => {
                if (d[lang] && d[lang].length > 0) {
                    document.getElementById(`t-${lang}`).style.display = 'flex';
                    const list = document.getElementById(`l-${lang}`);
                    d[lang].forEach((url, i) => {
                        if(!url) return;
                        const card = document.createElement('div');
                        card.className = 'server-card';
                        card.onclick = () => {
                            document.getElementById('ifr').src = url;
                            document.getElementById('video-layer').classList.add('active');
                            handleMotion();
                        };
                        card.innerHTML = `
                            <div class="server-meta">
                                <div class="play-btn-ui">▶</div>
                                <div class="server-name">
                                    <h4>Servidor ${i+1}</h4>
                                    <span>${lang == 'lat' ? 'Audio Latino' : 'Audio Original'}</span>
                                </div>
                            </div>
                            <div class="badge-hd">ULTRA HD</div>
                        `;
                        list.appendChild(card);
                    });
                }
            });
            setLang(d.lat && d.lat[0] ? 'lat' : 'jap');
        } catch(e) { console.error("Error data"); }
    }

    function setLang(lang) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById(`t-${lang}`).classList.add('active');
        document.getElementById(`l-${lang}`).classList.add('active');
    }

    function generate() {
        const getV = cls => Array.from(document.querySelectorAll(cls)).map(i => i.value.trim());
        const data = {
            title: document.getElementById('title-in').value,
            lat: getV('.lat-in'),
            jap: getV('.jap-in'),
            bg: document.getElementById('bg-in').value
        };
        const str = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        document.getElementById('res-url').value = window.location.origin + window.location.pathname + "?data=" + str;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyRes() {
        const inp = document.getElementById('res-url');
        inp.select();
        document.execCommand("copy");
    }

    function exitVideo() {
        document.getElementById('video-layer').classList.remove('active');
        document.getElementById('ifr').src = "";
    }
</script>
</body>
</html>
