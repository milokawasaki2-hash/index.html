<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

/* PANEL */
#panel{
  padding:20px;
  max-width:900px;
  margin:auto;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#111;
  border:none;
  color:#fff;
  border-radius:6px;
}

button{
  padding:10px;
  margin:5px 0;
  background:#ff3d00;
  border:none;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

/* PLAYER */
#player{display:none;}

.header{
  height:200px;
  background-size:cover;
  display:flex;
  align-items:end;
  padding:20px;
  background-position:center;
}

.langs{
  display:flex;
  overflow:auto;
  padding:10px;
}

.langs button{
  background:#111;
  margin-right:10px;
  border-radius:20px;
  padding:8px 15px;
}

.server{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.05);
  margin:10px;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.server:hover{
  background:rgba(255,255,255,0.15);
  transform:scale(1.02);
}

.server img{
  width:40px;
  margin-right:15px;
}

.server-info{
  display:flex;
  flex-direction:column;
}

.video-box{
  display:none;
  position:relative;
}

iframe{
  width:100%;
  height:400px;
  border:none;
}

.back{
  position:absolute;
  top:10px;
  left:10px;
  background:#000;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h2>🎬 Generador PRO</h2>

  <input id="title" placeholder="Título">
  <input id="poster" placeholder="Imagen fondo">

  <div id="servers"></div>

  <button onclick="addServer()">+ Agregar Servidor</button>
  <button onclick="generate()">Generar Link</button>

  <div id="result"></div>
</div>

<!-- PLAYER -->
<div id="player">
  <div class="header" id="bg">
    <h1 id="ptitle"></h1>
  </div>

  <div class="langs" id="langs"></div>

  <div id="list"></div>

  <div class="video-box" id="videoBox">
    <div class="back" onclick="back()">⬅ Volver</div>
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
// ICONOS SERVIDORES
const icons={
  streamwish:"https://i.imgur.com/8qR8Z8T.png",
  filemoon:"https://i.imgur.com/kL9Z9ZP.png",
  voesx:"https://i.imgur.com/Tk3Qb8O.png",
  doodstream:"https://i.imgur.com/9Z6Z9Z9.png",
  streamtape:"https://i.imgur.com/jZ7Z7Z7.png",
  netu:"https://i.imgur.com/YZ8Z8Z8.png",
  vidhide:"https://i.imgur.com/QZ9Z9Z9.png",
  plustream:"https://i.imgur.com/PZ5Z5Z5.png"
};

function addServer(){
  let div=document.createElement("div");
  div.innerHTML=`
    <input placeholder="Servidor (streamwish...)">
    <select>
      <option>Latino</option>
      <option>Español</option>
      <option>Inglés</option>
      <option>Japonés</option>
      <option>Otros</option>
    </select>
    <input placeholder="Calidad (FULL_HD)">
    <input placeholder="URL embed">
  `;
  document.getElementById("servers").appendChild(div);
}

function generate(){
  let data={
    title:title.value,
    poster:poster.value,
    list:[]
  };

  document.querySelectorAll("#servers div").forEach(d=>{
    let i=d.querySelectorAll("input,select");
    data.list.push({
      server:i[0].value.toLowerCase(),
      lang:i[1].value,
      quality:i[2].value,
      url:i[3].value
    });
  });

  let link=location.origin+location.pathname+"?data="+btoa(JSON.stringify(data));
  result.innerText=link;
}

/* PLAYER */
function load(){
  let p=new URLSearchParams(location.search).get("data");
  if(!p) return;

  panel.style.display="none";
  player.style.display="block";

  let data=JSON.parse(atob(p));

  ptitle.innerText=data.title;
  bg.style.backgroundImage=`url(${data.poster})`;

  let langs=[...new Set(data.list.map(x=>x.lang))];

  langs.forEach(l=>{
    let b=document.createElement("button");
    b.innerText=l;
    b.onclick=()=>show(l,data.list);
    langsDiv.appendChild(b);
  });

  show(langs[0],data.list);
}

function show(lang,list){
  listDiv.innerHTML="";
  videoBox.style.display="none";

  list.filter(x=>x.lang==lang).forEach(item=>{
    let d=document.createElement("div");
    d.className="server";

    let icon=icons[item.server]||"";

    d.innerHTML=`
      <img src="${icon}">
      <div class="server-info">
        <b>${item.server.toUpperCase()}</b>
        <span>Audio: ${item.lang} - Calidad: ${item.quality}</span>
      </div>
    `;

    d.onclick=()=>{
      frame.src=item.url;
      videoBox.style.display="block";
      listDiv.style.display="none";
    };

    listDiv.appendChild(d);
  });

  listDiv.style.display="block";
}

function back(){
  videoBox.style.display="none";
  listDiv.style.display="block";
}

let langsDiv=document.getElementById("langs");
let listDiv=document.getElementById("list");

load();
</script>

</body>
</html>
