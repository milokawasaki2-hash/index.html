<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador Múltiple Audio V4</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(10, 10, 12, 0.98);
            --item-hover: rgba(0, 212, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* --- GENERADOR (MÁS GRANDE PARA PC/CELULAR) --- */
        #ui-generator {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #050505; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }
        .card { 
            background: #000; padding: 35px 25px; border-radius: 20px; border: 1px solid #1a1a1a; 
            width: 100%; max-width: 650px; 
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
        }
        .section-group { margin-bottom: 18px; background: #080808; padding: 18px; border-radius: 12px; border: 1px solid #111; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-label { color: var(--neon-blue); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-add { background: var(--neon-blue); border: none; color: #000; border-radius: 8px; padding: 5px 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .input-list { display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        .btn-del { background: #ff3333; border: none; color: white; border-radius: 8px; padding: 0 15px; cursor: pointer; font-size: 16px; }

        input { 
            flex: 1; padding: 14px 18px; background: #000; border: 1px solid #222; 
            border-radius: 10px; color: #fff; font-size: 14px; outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

        .btn-main { 
            width: 100%; padding: 18px; background: var(--neon-blue); border: none; 
            font-weight: 800; border-radius: 10px; cursor: pointer; margin-top: 20px; 
            text-transform: uppercase; font-size: 13px; color: #000; letter-spacing: 1.5px;
        }

        /* --- PLAYER INTERFACE --- */
        #ui-player {
            display: none; width: 100%; height: 100vh;
            justify-content: center; align-items: center;
            position: relative; background-size: cover; background-position: center;
        }
        #overlay-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%); z-index: 1; }
        #content-wrapper { z-index: 10; width: 90%; max-width: 380px; text-align: center; }

        .tabs-audio { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; min-width: 45px; display: none; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .tab-btn img { width: 28px; height: 18px; border-radius: 3px; display: block; margin: 0 auto 4px; }
        .tab-btn span { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #fff; }

        .server-list { display: none; flex-direction: column; gap: 6px; max-height: 50vh; overflow-y: auto; padding: 5px; scrollbar-width: none; }
        .server-list.active { display: flex; }

        .server-item {
            background: var(--card-bg);
            border-radius: 6px; padding: 10px 15px;
            display: flex; align-items: center;
            gap: 12px; cursor: pointer;
            transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .server-item:hover { background: var(--item-hover); border-color: var(--neon-blue); }
        .play-icon { color: var(--neon-blue); font-size: 10px; }
        .server-info h4 { margin: 0; font-size: 11px; font-weight: 700; color: #fff; }
        .server-info p { margin: 0; font-size: 8px; color: #777; text-transform: uppercase; }

        /* VIDEO CONTAINER FULL SCREEN FIX */
        #video-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; visibility: hidden; z-index: 1000; background: #000; 
        }
        #video-container.active { opacity: 1; visibility: visible; }
        #main-ifr { width: 100%; height: 100%; border: none; }

        /* BOTÓN MENÚ DINÁMICO */
        #btn-back { 
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: var(--neon-blue); 
            border: 1px solid var(--neon-blue); 
            padding: 10px 30px; border-radius: 30px; 
            cursor: pointer; z-index: 2000; 
            font-size: 12px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        #btn-back.visible { opacity: 1; pointer-events: auto; top: 35px; }

        #box-link { display:none; margin-top:15px; border:1px solid #222; padding:15px; background: #050505; border-radius: 10px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- GENERADOR -->
    <div id="ui-generator">
        <div class="card">
            <h2 style="text-align:center; color:var(--neon-blue); margin-top:0; font-size: 22px; margin-bottom: 30px; letter-spacing: 1px;">GENERADOR MÚLTIPLE V4</h2>
            
            <div style="max-height: 55vh; overflow-y: auto; padding-right: 8px; margin-bottom: 20px;">
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇲🇽 Latino</span><button class="btn-add" onclick="addInput('lat')">+</button></div>
                    <div id="cont-lat" class="input-list"><input type="text" class="lat-in" placeholder="Pegar enlace aquí"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇯🇵 Japonés</span><button class="btn-add" onclick="addInput('jap')">+</button></div>
                    <div id="cont-jap" class="input-list"><input type="text" class="jap-in" placeholder="Pegar enlace aquí"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇪🇸 Castellano</span><button class="btn-add" onclick="addInput('cas')">+</button></div>
                    <div id="cont-cas" class="input-list"><input type="text" class="cas-in" placeholder="Pegar enlace aquí"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇺🇸 Inglés</span><button class="btn-add" onclick="addInput('ing')">+</button></div>
                    <div id="cont-ing" class="input-list"><input type="text" class="ing-in" placeholder="Pegar enlace aquí"></div>
                </div>
                <div class="section-group">
                    <span class="section-label" style="display:block; margin-bottom: 10px;">URL Imagen de Fondo</span>
                    <input type="text" id="bg-in" placeholder="https://tu-imagen.jpg" style="width: 100%; box-sizing: border-box;">
                </div>
            </div>
            
            <button class="btn-main" onclick="buildLink()">GENERAR REPRODUCTOR</button>
            <div id="box-link">
                <input type="text" id="out-url" readonly style="margin-bottom: 12px; font-size: 11px; color: var(--neon-blue); text-align: center; width: 100%; box-sizing: border-box;">
                <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); border:none; padding: 15px; font-weight:bold; border-radius: 8px; color: #000; font-size: 11px; cursor:pointer;">COPIAR ENLACE</button>
            </div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">MENÚ</button>

        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>Latino</span></div>
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span></div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')"><img src="https://flagcdn.com/w80/es.png"><span>Español</span></div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')"><img src="https://flagcdn.com/w80/us.png"><span>Inglés</span></div>
            </div>
            <div id="list-lat" class="server-list"></div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>

        <div id="video-container" onmousedown="triggerControls()" ontouchstart="triggerControls()">
            <!-- Corregido: Agregados todos los permisos de pantalla completa nativa -->
            <iframe id="main-ifr" 
                src="" 
                allow="autoplay; fullscreen; picture-in-picture; xr-spatial-tracking; encrypted-media" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>
        </div>
    </div>

<script>
    let hideTimeout;

    // Mostrar el botón de menú cuando se toca cualquier parte del video o la pantalla
    function triggerControls() {
        const btn = document.getElementById('btn-back');
        const container = document.getElementById('video-container');
        
        if (container.classList.contains('active')) {
            btn.classList.add('visible');
            
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                btn.classList.remove('visible');
            }, 3000); // Se oculta tras 3 segundos
        }
    }

    function addInput(lang) {
        const container = document.getElementById(`cont-${lang}`);
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<input type="text" class="${lang}-in" placeholder="Enlace Servidor"><button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    const q = new URLSearchParams(window.location.search);
    const v = q.get('v');

    if (v) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(v))));
            if (data.bg) document.getElementById('ui-player').style.backgroundImage = `url('${data.bg}')`;
            const order = ['lat', 'jap', 'cas', 'ing'];
            const names = ['Latino', 'Japonés', 'Castellano', 'Inglés'];
            let first = null;
            order.forEach((l, i) => {
                if (data[l]) {
                    const links = data[l].filter(u => u && u.trim() !== "");
                    if (links.length > 0) {
                        const list = document.getElementById(`list-${l}`);
                        links.forEach((url, idx) => {
                            const item = document.createElement('div');
                            item.className = 'server-item';
                            item.onclick = () => {
                                document.getElementById('main-ifr').src = url;
                                document.getElementById('video-container').classList.add('active');
                                triggerControls();
                            };
                            item.innerHTML = `<div class="play-icon">▶</div><div class="server-info"><h4>OPCIÓN ${idx+1}</h4><p>${names[i]}</p></div>`;
                            list.appendChild(item);
                        });
                        document.getElementById(`btn-${l}`).style.display = 'block';
                        if (!first) first = l;
                    }
                }
            });
            if (first) switchAudio(first);
        } catch(e) {}
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('list-' + lang).classList.add('active');
    }

    function buildLink() {
        const getVals = cls => Array.from(document.querySelectorAll(cls)).map(i => i.value.trim());
        const data = { lat: getVals('.lat-in'), jap: getVals('.jap-in'), cas: getVals('.cas-in'), ing: getVals('.ing-in'), bg: document.getElementById('bg-in').value };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        document.getElementById('out-url').value = window.location.origin + window.location.pathname + "?v=" + encoded;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const inp = document.getElementById('out-url');
        inp.select();
        document.execCommand("copy");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').classList.remove('visible');
        document.getElementById('main-ifr').src = '';
        clearTimeout(hideTimeout);
    }
</script>
</body>
</html>
